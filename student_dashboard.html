<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f2027;
    display:flex;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#111;
    color:white;
    padding:20px;
}

.sidebar h2{
    color:#00f2fe;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:20px 0;
}

.sidebar a:hover{
    color:#ff00ff;
}

.main{
    flex:1;
    padding:20px;
    background:#203a43;
    color:white;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#111;
    padding:20px;
    border-radius:10px;
    flex:1;
    text-align:center;
    box-shadow:0 0 10px #00f2fe;
}

/* SAFE PROGRESS BAR */
progress{
    width:100%;
    height:20px;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#00f2fe;
    color:black;
}

button{
    padding:10px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#ff00ff;
    color:white;
}

</style>

</head>

<body>

<div class="sidebar">
<h2>Student Panel</h2>
<a href="/student">Dashboard</a>
<a href="/profile">My Profile</a>
<a href="/download">Download</a>
<a href="/logout">Logout</a>
</div>

<div class="main">

<h2>Welcome {{name}}</h2>

<div class="cards">
<div class="card">Total Classes: {{total}}</div>
<div class="card">Present: {{present}}</div>
<div class="card">Attendance: {{percent}}%</div>
</div>

<!-- SAFE HTML PROGRESS BAR -->
<progress value="{{percent}}" max="100"></progress>

<h3>Recent Attendance</h3>

<table>
<tr>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td style="color:lime;">Present</td>
</tr>
{% endfor %}
</table>

<br>

<a href="/download"><button>Download Attendance</button></a>
<a href="/logout"><button>Logout</button></a>

</div>

</body>
</html>
